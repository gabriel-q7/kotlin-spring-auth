spring:
  datasource:
    url: jdbc:sqlite:./backend.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

app:
  jwt:
    # Use a secure base64 key (at least 32 bytes once decoded) in production.
    secret: c3VwZXItc2VjdXJlLWJhc2U2NC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHk=
    expiration-ms: 3600000

server:
  port: 8080
